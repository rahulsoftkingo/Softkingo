steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/softkingo:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/softkingo:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    timeout: 1200s

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/softkingo:$SHORT_SHA']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: 1800s

images:
  - 'gcr.io/$PROJECT_ID/softkingo:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/softkingo:latest'
